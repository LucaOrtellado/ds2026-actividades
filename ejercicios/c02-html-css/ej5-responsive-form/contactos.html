<body>

    <h1>Contacto</h1>
    <h3>Completa el siguiente formulario</h3>
        <form class="formulario">
    
            <label for="Nombre">Nombre</label>
            <input type="text" placeholder="Ingrese su nombre" required>

            <label for="Email">Email </label>
            <input type="email" placeholder="usuario@ejemplo.com" required>

            <label for="Asunto">Asunto </label>
            <input type="text" placeholder="Asunto" required>

            <label for="Teléfono">Teléfono</label>
            <input type="tel" placeholder="Numero de Teléfono" pattern="[0-9]{10}">

            <label for="mensaje">Mensaje </label>
            <textarea id="mensaje" placeholder="Mensaje" required minlength="10"></textarea>

            <button type="submit">Enviar</button>
        </form>
